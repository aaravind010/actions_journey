name: Generate ASCII art using Shell script

on: push

jobs:
    ascii_job:
        runs-on:
            - ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4

            - name: List the files
              run: ls -altrh

            - name: Execute ASCII Shell script
              run: |
                chmod +x ascii-script.sh
                ./ascii-script.sh       