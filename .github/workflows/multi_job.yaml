name: Multi Job Execution WF

on: push

jobs:
    build_job_1:
        runs-on:
            - ubuntu-latest
        steps:
            - name: Generate a ASCII art file
              run: |
                apt install cowsay -y
                cowsay -f dragon "I am the Dragon... Dracares" >> dragon.txt
                sleep 30
    
    test_job_2:
        runs-on:
          - ubuntu-latest
        steps:
            - name: Test the Dragon file availablity
              run: |
                grep -i "dragon:" dragon.txt
                sleep 15
    
    deploy_job_3:
        runs-on:
          - ubuntu-latest
        steps:
            - name: Read the file
              run: cat dragon.txt